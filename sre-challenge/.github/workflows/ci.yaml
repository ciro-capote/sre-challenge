name: CI - Build and Push
on:
  push:
    branches: [ "main", "staging" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t cirocapote/crypto-app:${{ github.sha }} ./app
      # SRE Note: Em um ambiente real, adicionariamos o login no DockerHub e o comando 'docker push'
