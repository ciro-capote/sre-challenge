name: CD - Deploy Helm
on:
  push:
    branches: [ "main", "staging" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Define Environment
        id: env_def
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          else
            echo "ENV_NAME=staging" >> $GITHUB_ENV
          fi
      # Num ambiente real, aqui conectariamos no GKE (google-github-actions/auth)
      # e executariamos o comando:
      # helm upgrade --install api-${{ env.ENV_NAME }} ./helm/crypto-app --set environment=${{ env.ENV_NAME }}
