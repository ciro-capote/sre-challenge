apiVersion: apps/v1
kind: Deployment
metadata:
  # Nome dinâmico baseado no Release do Helm (ex: api-staging-deploy)
  name: {{ .Release.Name }}-deploy
  labels:
    app: crypto-api
    env: {{ .Values.environment }}
spec:
  # O HPA (Horizontal Pod Autoscaler) controlará o número de réplicas se ativado.
  # Por padrão, mantemos 2 para Alta Disponibilidade básica.
  replicas: {{ .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      app: crypto-api
  template:
    metadata:
      labels:
        app: crypto-api
    spec:
      containers:
        - name: crypto-api
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          
          # [DECISÃO SRE] ENVIRONMENT VARIABLES
          # Injetamos o ambiente (prod/staging) para a app saber onde está rodando.
          env:
            - name: ENVIRONMENT
              value: {{ .Values.environment }}

          # [DECISÃO SRE] RESOURCE LIMITS & REQUESTS
          # Previne o "Noisy Neighbor" (vizinho barulhenta).
          # 'Requests' garante reserva de hardware; 'Limits' impede que o Pod trave o nó.
          resources:
            requests:
              memory: "128Mi"   # Mínimo garantido para o Pod nascer
              cpu: "100m"      # 10% de 1 core (100 milicores)
            limits:
              memory: "256Mi"  # Teto máximo de RAM antes do OOM (Out of Memory)
              cpu: "500m"      # Teto máximo de CPU antes de sofrer Throttling

          # LIVENESS PROBE
          # "O container ainda está vivo?" 
          # Se a API travar (deadlock), o K8s reinicia o container automaticamente.
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10 # Aguarda 10s para a app subir antes de testar
            periodSeconds: 15       # Testa a cada 15 segundos

          # READINESS PROBE
          # "A aplicação está PRONTA para receber tráfego?"
          # Garante Zero Downtime: o Service só manda requisição quando a app responde OK.
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5  # Começa a testar rápido
            periodSeconds: 5        # Frequência maior para entrar logo no balanceamento

      # [DECISÃO SRE] ISOLAMENTO DE WORKLOAD (SCHEDULING)
      # NODE SELECTOR: Garante que o pod PROCURE nós com a label certa.
      nodeSelector:
        environment: {{ .Values.environment }}
      
      # TOLERATIONS: Permite que o pod ENTRE em nós que possuem o Taint (repelente).
      # Sem isso, o Pod ficaria em 'Pending' para sempre se o nó tiver Taints.
      tolerations:
      - key: "environment"
        operator: "Equal"
        value: {{ .Values.environment }}
        effect: "NoSchedule"
