kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  
  # Simula o Node Pool de Staging
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "environment=staging"
            register-with-taints: "environment=staging:NoSchedule"

  # Simula o Node Pool de Produção
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "environment=prod"
            register-with-taints: "environment=prod:NoSchedule"
